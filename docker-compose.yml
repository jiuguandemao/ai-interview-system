services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ai_interview
      POSTGRES_USER: ai_interview
      POSTGRES_PASSWORD: ai_interview
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_interview -d ai_interview"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build: .
    env_file: .env
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - app_data:/app/data
      - model_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build: .
    env_file: .env
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=INFO --concurrency=2
    volumes:
      - .:/app
      - app_data:/app/data
      - model_cache:/root/.cache/huggingface
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  frontend:
    build: .
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000/api/v1
    command: streamlit run frontend/streamlit_app.py --server.address=0.0.0.0 --server.port=8501
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  app_data:
  model_cache:
